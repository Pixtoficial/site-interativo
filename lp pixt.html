<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PIXT | Sua Forca de Trabalho Sintetica</title>
  <meta name="description" content="Agentes de IA que vendem, qualificam e gerenciam sua operacao 24/7. Agende seu diagnostico gratuito.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Work+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    /* === RESET === */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* === DESIGN TOKENS === */
    :root {
      /* Brand */
      --color-accent: #c6f432;
      --color-bg: #ffffff;
      --color-text: #111211;
      --color-text-muted: #6b7280;
      --color-border: rgba(17, 18, 17, 0.08);

      /* Typography */
      --font-display: 'Space Grotesk', sans-serif;
      --font-body: 'Work Sans', sans-serif;

      /* Hero headline scale per D-03 */
      --hero-headline-size: clamp(2.5rem, 7vw, 7rem);

      /* Spacing scale */
      --space-xs: 0.5rem;
      --space-sm: 1rem;
      --space-md: 2rem;
      --space-lg: 4rem;
      --space-xl: 8rem;

      /* Layout */
      --container-max: 1280px;
      --nav-height: 64px;
    }

    html {
      scroll-behavior: smooth; /* per D-08 / FOOT-02 */
    }

    body {
      font-family: var(--font-body);
      font-size: 1rem;
      line-height: 1.6;
      color: var(--color-text);
      background: var(--color-bg);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: var(--font-display);
      line-height: 1.1;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img, svg {
      display: block;
      max-width: 100%;
    }

    /* === NAV === */
    .nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      height: var(--nav-height);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 var(--space-md);
      background: rgba(255, 255, 255, 0.80);
      -webkit-backdrop-filter: blur(12px);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--color-border);
    }

    .nav__logo {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--color-text);
      letter-spacing: -0.02em;
    }

    .nav__cta {
      display: inline-flex;
      align-items: center;
      padding: 0.625rem 1.5rem;
      font-family: var(--font-display);
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--color-text);
      background: var(--color-accent);
      border-radius: 8px;
      transition: opacity 0.2s ease, transform 0.2s ease; /* PERF-01: only transform/opacity */
    }

    .nav__cta:hover {
      opacity: 0.9;
      transform: scale(1.02); /* PERF-01 compliant */
    }

    /* Nav show/hide classes — activated by JS in Phase 3 */
    /* .nav--hidden { transform: translateY(-100%); } */
    /* .nav--visible { transform: translateY(0); } */

    /* === LAYOUT UTILITIES === */
    .container {
      width: 100%;
      max-width: var(--container-max);
      margin: 0 auto;
      padding: 0 var(--space-md);
    }
  </style>
</head>
<body>

  <header class="nav" role="banner">
    <a href="#" class="nav__logo">PIXT</a>
    <a href="#contact" class="nav__cta">Falar com Especialista</a>
  </header>

  <main>
    <!-- Hero section added in Task 2 of Plan 02 -->
    <!-- Content sections added in Phase 2 -->
    <!-- Contact form section added in Phase 3 -->
    <section id="contact"></section>
  </main>

  <footer>
    <!-- Footer content added in Plan 02 -->
  </footer>

</body>
</html>
