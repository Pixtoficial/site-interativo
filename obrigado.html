<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscrição Confirmada | PIXT</title>
    <meta name="robots" content="noindex">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;900&family=Work+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --brand: #c6f432;
            --dark: #050505;
        }

        body {
            background-color: var(--brand);
            color: var(--dark);
            font-family: 'Work Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* Textura de fundo sutil (igual Jornada) */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(to right, rgba(0,0,0,0.04) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0,0,0,0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        /* Topo */
        .top-bar {
            position: relative;
            z-index: 10;
            padding: 1.25rem 2rem;
            border-bottom: 1px solid rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: rgba(0,0,0,0.55);
            font-size: 0.875rem;
            font-weight: 500;
            text-decoration: none;
            transition: color 0.2s;
        }
        .back-link:hover { color: var(--dark); }
        .back-link svg { flex-shrink: 0; }

        .top-logo img {
            height: 2.5rem;
            object-fit: contain;
        }

        /* Container principal */
        .main {
            flex: 1;
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 4rem 1.5rem;
        }

        /* Ícone de check */
        .check-circle {
            width: 72px;
            height: 72px;
            background: var(--dark);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            box-shadow: 0 8px 40px rgba(0,0,0,0.25);
            animation: pop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes pop {
            0%   { opacity: 0; transform: scale(0.4); }
            100% { opacity: 1; transform: scale(1); }
        }

        .tag {
            display: inline-block;
            background: rgba(0,0,0,0.1);
            color: var(--dark);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            padding: 0.35rem 1rem;
            border-radius: 100px;
            border: 1px solid rgba(0,0,0,0.15);
            margin-bottom: 1.5rem;
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 900;
            line-height: 1.1;
            letter-spacing: -0.03em;
            margin-bottom: 1.5rem;
            color: var(--dark);
        }

        .subtitle {
            color: rgba(0,0,0,0.6);
            font-size: clamp(1rem, 2vw, 1.125rem);
            max-width: 500px;
            line-height: 1.7;
            margin-bottom: 3rem;
        }

        /* Botões sociais */
        .social-buttons {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 3.5rem;
        }

        .btn-social {
            display: inline-flex;
            align-items: center;
            gap: 0.625rem;
            padding: 0.875rem 1.75rem;
            border-radius: 100px;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
            white-space: nowrap;
        }
        .btn-social:hover { transform: translateY(-2px); }

        .btn-instagram {
            background: var(--dark);
            color: var(--brand);
            box-shadow: 0 4px 24px rgba(0,0,0,0.2);
        }
        .btn-instagram:hover { box-shadow: 0 8px 36px rgba(0,0,0,0.35); }

        .btn-linkedin {
            background: transparent;
            color: var(--dark);
            border: 2px solid rgba(0,0,0,0.3);
        }
        .btn-linkedin:hover { background: rgba(0,0,0,0.06); border-color: rgba(0,0,0,0.5); }

        /* Divisor */
        .divider {
            width: 48px;
            height: 2px;
            background: rgba(0,0,0,0.15);
            margin: 0 auto;
            border-radius: 2px;
        }

        /* Footer */
        .footer {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 1.25rem;
            font-size: 0.8rem;
            color: rgba(0,0,0,0.4);
            border-top: 1px solid rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <a href="site oficial.html" class="back-link">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                <polyline points="15 18 9 12 15 6"/>
            </svg>
            Voltar ao site
        </a>
        <div class="top-logo">
            <img src="Logo 2 preto.png" alt="PIXT">
        </div>
    </div>

    <main class="main">

        <div class="check-circle">
            <svg width="32" height="32" fill="none" stroke="#c6f432" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                <polyline points="20 6 9 17 4 12"/>
            </svg>
        </div>

        <div class="tag">Inscrição Confirmada</div>

        <h1>
            Obrigado por<br>se inscrever.
        </h1>

        <p class="subtitle">
            Um especialista entrará em contato o quanto antes.<br>
            Enquanto isso, conheça mais um pouco sobre a Pixt e como trabalhamos.
        </p>

        <div class="social-buttons">
            <a href="https://www.instagram.com/pixt.ia" target="_blank" rel="noopener noreferrer" class="btn-social btn-instagram">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                    <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
                    <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/>
                    <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>
                </svg>
                Acessar Instagram
            </a>
            <a href="https://www.linkedin.com/company/pixt-ia" target="_blank" rel="noopener noreferrer" class="btn-social btn-linkedin">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                    <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/>
                    <rect x="2" y="9" width="4" height="12"/>
                    <circle cx="4" cy="4" r="2"/>
                </svg>
                Acessar LinkedIn
            </a>
        </div>

        <div class="divider"></div>

    </main>

    <footer class="footer">
        © 2026 PIXT. Todos os direitos reservados.
    </footer>

</body>
</html>
